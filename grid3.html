<!DOCTYPE html>
<html>
<head>

	<title></title>
	<script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.min.js"></script>

</head>
<body>
	<script>
		function setup(){
			createCanvas(1500,800);
		}
		function draw(){
			background(300)
			for (let i=0; i<17; i++){
			for (let j=0; j<20; j++){
				let x=i*100
				let y=j*100
				strokeWeight(20)
				stroke("pink")
				line(x-50,y-50, x, y)
				stroke("yellow")
				line(x,y, x+50,y-50)
			}
			}
		}
	</script>
</body>
</html>
