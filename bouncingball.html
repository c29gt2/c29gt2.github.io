<!DOCTYPE html>
<html>
<head>
	<title></title>
	<script src="https://cdn.jsdelivr.net/npm/p5@1.11.13/lib/p5.min.js"></script>
</head>
<body>
	<script>
		let xpos
		let ypos
		let xspeed
		let yspeed
		d = 50
		////circleColor = "white"

		function setup(){
		createCanvas(800,800)
			xpos = width/2
			ypos = height/2
			xspeed = 5
			yspeed = 8
		}
		function draw(){
			background(200)
			if (xpos + d/2 > width || xpos - d/2 < 0){
			xspeed *= -1
			}

			if (ypos + d/2 > height || ypos - d/2 < 0) {
				yspeed *= -1
			}

			///if (xpos > width/2 && ypos < height/2) {
				///circleColor = "#B1DDF1"
			///}
			///else{
				///circleColor = "#FDCFF3"
			//}


			changeBallColor("lightblue", "lightpink", "lightyellow", "red")

			xpos+=xspeed
			ypos+=yspeed
			fill(fillColor)
			circle(xpos,ypos,50)
		}


		function changeBallColor(topRightColor, bottomRightColor, topLeftColor, bottomLeftColor){
			if (xpos > width/2 && ypos < height/2) {
				fillColor = topRightColor
			} else if (xpos > width/2 && ypos > height/2){
				fillColor = bottomRightColor
			} else if (xpos < width/2 && ypos<height/2){
				fillColor = topLeftColor
			}
			else{
				fillColor = bottomLeftColor
			}
		}
	</script>
</body>
</html>
