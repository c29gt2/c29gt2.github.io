<!DOCTYPE html>
<html>
<head>
	<title></title>
	<script src="https://cdn.jsdelivr.net/npm/p5@1/lib/p5.min.js"></script>
</head>
<body>
	<script>
		let xpos
		let ypos
		function setup(){
			createCanvas(800,800)
			background(300)
			xpos=width/2
			ypos=height/2
		}

		function draw(){

			let randomNumber = floor(random(4))
			let randomColor = random(["#03045E","#0077B6","#00B4D8","90E0EF","CAF0F8"])

			if(randomNumber==0){
				xpos = xpos + 10
			}else if (randomNumber == 1){
				xpos = xpos - 10
			}else if (randomNumber == 2){
				ypos = ypos + 10
			}else if (randomNumber == 3){
				ypos = ypos - 10
			}
			fill(randomColor)
			circle(xpos, ypos, 50)
		}
	</script>
</body>
</html>
